<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Status Checker</title>
<style>
body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #f8f9fa, #e9ecef);
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    flex-direction: column;
}

.container {
    background: white;
    padding: 30px 20px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    width: 90%;
    max-width: 400px;
    text-align: center;
}

.logo {
    max-width: 150px;
    margin-bottom: 20px;
    border-radius: 10px;
}

h2 {
    margin-bottom: 20px;
    color: #343a40;
    font-size: 1.8em;
}

input[type="text"] {
    width: 100%;
    padding: 12px 15px;
    margin: 10px 0;
    border: 1px solid #ced4da;
    border-radius: 8px;
    font-size: 1em;
    box-sizing: border-box;
    transition: 0.3s;
}

input[type="text"]:focus {
    border-color: #28a745;
    outline: none;
    box-shadow: 0 0 8px rgba(40, 167, 69, 0.2);
}

button {
    width: 100%;
    padding: 12px;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1em;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #218838;
}

#output { margin-top: 20px; }

/* Result card */
.result {
    background: #f1f3f5;
    padding: 20px;
    border-radius: 10px;
    text-align: left;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    animation: fadeIn 0.5s ease;
}

/* Badge styles */
.badge {
    padding: 5px 10px;
    border-radius: 5px;
    color: white;
    font-weight: bold;
    display: inline-block;
    transition: background 0.5s ease, transform 0.3s ease;
    opacity: 0;
    animation: badgeFadeIn 0.5s forwards;
}

.processing { background: orange; animation: badgePulse 1.5s infinite; }
.completed { background: green; }
.pending { background: red; }

/* Cool search animation (bouncing dots) */
.searching {
    background: #f1f3f5;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    color: #555;
}

.dots {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
}

.dots span {
    width: 12px;
    height: 12px;
    background: #28a745;
    border-radius: 50%;
    display: inline-block;
    animation: bounce 0.6s infinite alternate;
}

.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }

/* Animations */
@keyframes fadeIn { from {opacity:0; transform:translateY(10px);} to {opacity:1; transform:translateY(0);} }
@keyframes badgeFadeIn { 0% {opacity:0; transform:scale(0.7);} 100% {opacity:1; transform:scale(1);} }
@keyframes badgePulse { 0% {transform:scale(1); opacity:1;} 50% {transform:scale(1.1); opacity:0.8;} 100% {transform:scale(1); opacity:1;} }
@keyframes bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-10px); } }

@media (max-width: 400px) {
    .container { padding: 20px 15px; }
    h2 { font-size: 1.5em; }
    input, button { font-size: 0.95em; }
}
</style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="Motisons Logo" class="logo">

    <h2>📦 Track Your Order</h2>
    <input type="text" id="orderNo" placeholder="ORD-123 / REP-123">
    <input type="text" id="mobileNo" placeholder="Enter your mobile number without country code">
    <button onclick="checkStatus()">Check Status</button>
    <div id="output"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz9FxPB5yaEui2qph26BZvZwD31zJImL4GpydBdQ-7slfTiRHIkrLQfGoBgrH_Kg6AQUg/exec";

function checkStatus() {
    const order = document.getElementById("orderNo").value.trim();
    const mobile = document.getElementById("mobileNo").value.trim();

    if (!order || !mobile) {
        alert("⚠️ Please enter both Order/Repair Number and Mobile Number");
        return;
    }

    const outputDiv = document.getElementById("output");

    outputDiv.innerHTML = `
      <div class="searching">
        <p style="font-weight:bold; font-size:1.1em;">🔍 Searching for your order</p>
        <div class="dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    `;

    const normalizeMobile = (val) => String(val || "").replace(/\D/g, "");
    const normalizeOrder = (val) => String(val || "").trim().toLowerCase().replace(/[^a-z0-9]/g, "");

    const enteredOrder = normalizeOrder(order);
    const enteredMobile = normalizeMobile(mobile);

    function getOrderValue(record) {
        return record?.order ?? record?.orderNo ?? record?.order_no ?? record?.orderNumber ?? record?.repairNo ?? record?.repair_no ?? record?.id ?? "";
    }

    function getMobileValue(record) {
        return record?.contact ?? record?.mobile ?? record?.mobileNo ?? record?.mobile_no ?? record?.phone ?? "";
    }

    function getNameValue(record) {
        return record?.name ?? record?.customer ?? record?.customerName ?? "";
    }

    function getProductValue(record) {
        return record?.product ?? record?.productName ?? record?.item ?? "";
    }

    function getStatusValue(record) {
        return record?.status ?? record?.message ?? record?.statusMessage ?? "";
    }

    function isExactMatch(record) {
        const returnedOrder = normalizeOrder(getOrderValue(record));
        const returnedMobile = normalizeMobile(getMobileValue(record));
        return returnedOrder === enteredOrder && returnedMobile === enteredMobile;
    }

    function findMatchingRecord(payload) {
        if (!payload) return null;

        if (Array.isArray(payload)) {
            return payload.find(isExactMatch) || null;
        }

        if (payload.data) {
            const nested = findMatchingRecord(payload.data);
            if (nested) return nested;
        }

        if (payload.records) {
            const nested = findMatchingRecord(payload.records);
            if (nested) return nested;
        }

        if (payload.result) {
            const nested = findMatchingRecord(payload.result);
            if (nested) return nested;
        }

        if (typeof payload === "object" && isExactMatch(payload)) {
            return payload;
        }

        return null;
    }

    function renderResult(record) {
        let status = getStatusValue(record) || "";
        let badgeClass = "pending";
        if (status.toLowerCase().includes("processing")) badgeClass = "processing";
        else if (status.toLowerCase().includes("completed") || status.toLowerCase().includes("pickup")) badgeClass = "completed";

        if (status.toLowerCase().includes("completed") || status.toLowerCase().includes("pickup")) {
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            const beep = new Audio('https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg');
            beep.play().catch(e => console.log('Sound blocked'));
        }

        outputDiv.innerHTML = `
          <div class="result">
            <p><b>Order:</b> ${getOrderValue(record)}</p>
            <p><b>Name:</b> ${getNameValue(record)}</p>
            <p><b>Mobile:</b> ${getMobileValue(record)}</p>
            <p><b>Product:</b> ${getProductValue(record)}</p>
            <p><b>Status:</b> <span class="badge ${badgeClass}">${getStatusValue(record)}</span></p>
          </div>
        `;
    }

    function fetchJson(url) {
        return fetch(url).then(res => res.json()).catch(() => null);
    }

    const requests = [
        `${API_URL}?order=${encodeURIComponent(order)}&mobile=${encodeURIComponent(mobile)}`,
        `${API_URL}?order=${encodeURIComponent(order)}&mobile=`,
        `${API_URL}?order=${encodeURIComponent(order.toUpperCase())}&mobile=`,
        `${API_URL}?order=${encodeURIComponent(order.toLowerCase())}&mobile=`,
        `${API_URL}?order=&mobile=${encodeURIComponent(mobile)}`
    ];

    let index = 0;

    function tryNext() {
        if (index >= requests.length) {
            outputDiv.innerHTML = "<p style='color:red; font-weight:bold;'>❌ No data found</p>";
            return;
        }

        fetchJson(requests[index++]).then(response => {
            const match = findMatchingRecord(response);
            if (match) {
                renderResult(match);
            } else {
                tryNext();
            }
        }).catch(() => {
            tryNext();
        });
    }

    tryNext();
}

</script>

</body>
</html>
